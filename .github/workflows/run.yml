name: cron

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: write

    steps:
      - name: checkout all tags
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2
        with:
          ref: 'master'
          fetch-depth: 0

      # latest pyhton version
      - name: get latest version and last tag
        run: |
          export LATEST_VERSION=$(curl -s https://api.github.com/repos/python/cpython/tags | jq --raw-output .[].name | grep -oE 'v[0-9]{1,3}.[0-9]{1,3}.[^A-Za-z]{1,}$' | head -n 1 | sed 's|v||')
          export LATEST_TAG=$(git describe --abbrev=0 --tags `git rev-list --tags --max-count=1` | sed 's|v||')
          echo "WORKFLOW_UPDATE_BASE64JSON=$(echo '{"version":"'${LATEST_VERSION}'", "tag":"'${LATEST_TAG}'"}' | base64 -w 0)" >> "${GITHUB_ENV}"
          echo "LATEST_VERSION=${LATEST_VERSION}" >> "${GITHUB_ENV}"
          if ! curl -kILs --fail https://hub.docker.com/v2/repositories/11notes/python/tags/wheel-${LATEST_VERSION}; then
            echo "LATEST_VERSION_WHEEL=true" >> "${GITHUB_ENV}"
          fi

      - name: call org.update
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        with:
          wait-for-completion: false
          workflow: org.update.yml
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "etc":"${{ env.WORKFLOW_UPDATE_BASE64JSON }}" }'

      - name: call wheel
        if: env.LATEST_VERSION_WHEEL== 'true'
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        with:
          wait-for-completion: false
          workflow: wheel.yml
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "version":"${{ env.LATEST_VERSION }}" }'

      # python 3.13
      - name: get latest 3.13 version
        run: |
          for PAGE in {1..50}; do
            LATEST_VERSION=$(curl -s https://api.github.com/repos/python/cpython/tags?page=${PAGE} | jq --raw-output .[].name | grep -oE 'v[0-9]{1,3}.[0-9]{1,3}.[^A-Za-z]{1,}$' | grep -oE 'v3\.13.[^A-Za-z]{1,}$' | head -n 1 | sed 's|v||')
            if [ "${LATEST_VERSION}" != "null" ]; then
              if ! curl -kILs --fail https://hub.docker.com/v2/repositories/11notes/python/tags/${LATEST_VERSION}; then
                echo "LATEST_VERSION_313=${LATEST_VERSION}" >> "${GITHUB_ENV}"
                echo "found python version ${LATEST_VERSION} not yet built!"
              fi
              break
            fi
          done

      - name: call version 3.13
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        if: env.LATEST_VERSION_313 != 'null'
        with:
          wait-for-completion: false
          workflow: org.version
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "version":"${{ env.LATEST_VERSION_313 }}" }'

      - name: call wheel 3.13
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        if: env.LATEST_VERSION_313 != 'null'
        with:
          wait-for-completion: false
          workflow: wheel.yml
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "version":"${{ env.LATEST_VERSION_313 }}" }'

      # python 3.12
      - name: get latest 3.12 version
        run: |
          for PAGE in {1..50}; do
            LATEST_VERSION=$(curl -s https://api.github.com/repos/python/cpython/tags?page=${PAGE} | jq --raw-output .[].name | grep -oE 'v[0-9]{1,3}.[0-9]{1,3}.[^A-Za-z]{1,}$' | grep -oE 'v3\.12.[^A-Za-z]{1,}$' | head -n 1 | sed 's|v||')
            if [ "${LATEST_VERSION}" != "null" ]; then
              if ! curl -kILs --fail https://hub.docker.com/v2/repositories/11notes/python/tags/${LATEST_VERSION}; then
                echo "LATEST_VERSION_312=${LATEST_VERSION}" >> "${GITHUB_ENV}"
                echo "found python version ${LATEST_VERSION} not yet built!"
              fi
              break
            fi
          done

      - name: call version 3.12
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        if: env.LATEST_VERSION_312 != 'null'
        with:
          wait-for-completion: false
          workflow: org.version
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "version":"${{ env.LATEST_VERSION_312 }}" }'

      - name: call wheel 3.12
        uses: the-actions-org/workflow-dispatch@3133c5d135c7dbe4be4f9793872b6ef331b53bc7
        if: env.LATEST_VERSION_312 != 'null'
        with:
          wait-for-completion: false
          workflow: wheel.yml
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "version":"${{ env.LATEST_VERSION_312 }}" }'