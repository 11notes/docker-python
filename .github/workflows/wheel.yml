name: wheel
run-name: org.version ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'set version for wheel'
        type: string
        required: true

jobs:
  wheel:
    runs-on: ubuntu-latest
    steps:
      - name: semver / setup config
        uses: actions/github-script@62c3794a3eb6788d9a2a72b219504732c0c9a298
        with:
          script: |
            const { Buffer } = require('node:buffer');
            const etc = {
              dockerfile:"wheel.dockerfile",
              tag:"wheel",
              version:"${{ github.event.inputs.version }}",
              semver:{disable:{rolling: true}}
            };
            core.exportVariable('WORKFLOW_BASE64JSON', Buffer.from(JSON.stringify(etc)).toString('base64'));

      - name: semver / build container image
        uses: benc-uk/workflow-dispatch@7a027648b88c2413826b6ddd6c76114894dc5ec4 #v1.3.1
        with:
          wait-for-completion: false
          workflow: org.container.yml
          token: "${{ secrets.REPOSITORY_TOKEN }}"
          inputs: '{ "release":"false", "readme":"false", "run-name":"org.container build wheel ${{ github.event.inputs.version }}", "etc":"${{ env.WORKFLOW_BASE64JSON }}" }'